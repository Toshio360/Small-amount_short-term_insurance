<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout}">

<head>
    <title>申込確認</title>
</head>

<body>
    <div th:fragment="content">
        <h2>申込内容確認</h2>

        <form th:action="@{/contract/application}" method="post" th:object="${applicationRequest}">

            商品ID: <input type="text" th:field="*{productId}" disabled /><br />
            プランID: <input type="text" th:field="*{planId}" disabled /><br />

            <button type="submit">申込する</button>
        </form>
    </div>
</body>

</html>

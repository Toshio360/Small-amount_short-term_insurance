<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="navbar">

<head>
    <meta charset="UTF-8">
    <!-- <title th:replace="${title}">Small Insurance</title> -->

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">少額短期保険 申込システム</span>
        </div>
    </nav>

    <div>
        <!-- 進捗タブ -->
        <ul class="nav nav-tabs mb-4">

            <li class="nav-item" th:each="s : ${steps}">
                <a class="nav-link" th:text="${s.displayName}"
                    th:classappend="${(step.order == s.order) ? 'active': (step.order > s.order) ? '' : 'disabled'}"
                    th:href="@{${s.path + (step.order > s.order ? '?productId=' + productId + '&planId=' + planId : '')}}">
                </a>
            </li>

        </ul>
        <div class="container" th:repLace="~{::content}">
            ここがコンテンツエリアです
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
            </script>
    </div>

</body>

</html>

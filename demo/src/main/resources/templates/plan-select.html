<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>プラン選択</title>
</head>
<body>

<h2>プラン選択</h2>

<p>商品：<span th:text="${productName}"></span></p>

<form action="/contract/estimate" method="post">
    <input type="hidden" name="productId" th:value="${productId}">

    <h3>プランを選択してください</h3>
    <div th:each="plan : ${plans}">
        <label>
            <input type="radio" name="planId" th:value="${plan.planId}" required>
            <span th:text="${plan.name}"></span>
            （補償：<span th:text="${plan.coverageAmount}"></span>円）
        </label>
        <br>
    </div>

    <h3>年齢</h3>
    <input type="number" name="age" min="18" max="80" required>

    <h3>保険期間（月）</h3>
    <input type="number" name="period" min="1" max="36" required>

    <br><br>
    <button type="submit">見積する</button>
</form>

<div th:if="${premium != null}">
    <h3>--- 見積結果 ---</h3>
    <p>保険料：<span th:text="${premium}"></span> 円 / 月</p>

    <form action="/contract/eligibility" method="get">
        <input type="hidden" name="productId" th:value="${productId}">
        <input type="hidden" name="planId" th:value="${selectedPlanId}">
        <input type="hidden" name="age" th:value="${age}">
        <button type="submit">申込可否判定へ</button>
    </form>
</div>

</body>
</html>

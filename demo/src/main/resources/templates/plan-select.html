<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="content">

<head>
    <title>プラン選択</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h2 class="mb-4">プラン選択</h2>

    <p>商品：<span th:text="${productName}"></span></p>

    <form action="/contract/estimate" method="post" class="card p-4 shadow-sm">

        <input type="hidden" name="productId" th:value="${productId}">

        <h4 class="mb-3">プランを選択してください</h4>

        <div class="list-group mb-3" th:each="plan : ${plans}">
            <label class="list-group-item">
                <input type="radio" name="planId" th:value="${plan.planId}"
                    th:checked="${plan.planId == selectedPlanId}" class="form-check-input me-2" required>
                <span class="fw-bold" th:text="${plan.name}"></span>
                <div class="small text-muted">
                    補償：<span th:text="${plan.coverageAmount}"></span> 円
                </div>
            </label>
        </div>

        <h4 class="mb-3">年齢</h4>
        <input type="number" name="age" min="18" max="80" th:value="${age}" class="form-control mb-3" required>

        <h4 class="mb-3">保険期間（月）</h4>
        <input type="number" name="period" min="1" max="36" th:value="${period}" class="form-control mb-3" required>

        <button type="submit" class="btn btn-primary w-100">見積する</button>
    </form>

    <div th:if="${premium != null}" class="mt-4">

        <div class="alert alert-info shadow-sm">
            <h5 class="alert-heading">見積結果</h5>
            <p>保険料：<span th:text="${premium}"></span> 円 / 月</p>
        </div>

        <form action="/contract/eligibility" method="get">
            <input type="hidden" name="productId" th:value="${productId}">
            <input type="hidden" name="planId" th:value="${planId}">
            <input type="hidden" name="age" th:value="${age}">
            <button type="submit" class="btn btn-success w-100">申込可否判定へ</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>

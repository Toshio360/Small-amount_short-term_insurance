spring:
  application:
    name: demoapi

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: psql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8089

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace